<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - Smart City</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 48px 40px;
            border-radius: 24px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 420px;
            color: #e0e0e0;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand .icon {
            font-size: 52px;
            display: block;
            margin-bottom: 10px;
        }

        .brand h1 { font-size: 22px; color: #fff; margin-bottom: 4px; }
        .brand p  { font-size: 13px; color: #8a94aa; }

        .badge {
            display: inline-block;
            background: rgba(255,80,80,0.15);
            border: 1px solid rgba(255,80,80,0.35);
            color: #ff7070;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 1px;
            margin-top: 6px;
        }

        .field { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 13px;
            color: #9aa4bb;
            margin-bottom: 7px;
            font-weight: 500;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 11px;
            color: #e8eaf0;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus {
            outline: none;
            border-color: rgba(102,126,234,0.7);
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }

        input::placeholder { color: #5a6278; }

        .error-msg {
            background: rgba(220,53,69,0.12);
            border: 1px solid rgba(220,53,69,0.35);
            color: #ff6b6b;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 9px;
            margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 4px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.4);
        }

        .divider { text-align: center; margin: 20px 0 0; }

        .divider a {
            color: #8899cc;
            font-size: 13px;
            text-decoration: none;
            transition: color 0.3s;
        }

        .divider a:hover { color: #aabcff; }

        .info-note {
            background: rgba(102,126,234,0.08);
            border: 1px solid rgba(102,126,234,0.2);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 12px;
            color: #7a88aa;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand">
        <span class="icon">🏙️</span>
        <h1>Smart City Portal</h1>
        <p>Complaint Management System</p>
        <span class="badge">ADMIN ACCESS</span>
    </div>

    {% if error %}
    <div class="error-msg">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/admin/login">
        <div class="field">
            <label for="username">👤 Username</label>
            <input type="text" id="username" name="username" placeholder="Enter admin username" required autocomplete="username">
        </div>
        <div class="field">
            <label for="password">🔒 Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login">🔑 Login to Dashboard</button>
    </form>

    <div class="divider">
        <a href="/">← Back to Citizen Portal</a>
    </div>

    <div class="info-note">
        This panel is restricted to authorized administrators only.
    </div>
</div>

</body>
</html>
